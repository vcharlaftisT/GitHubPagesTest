<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess-Card Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Opponent Zone (Top) -->
        <div id="opponent-zone" class="player-zone thin-zone">
            <span class="ai-stat-inline"><strong>Norse AI</strong></span>
            <span class="stat-scoreboard enemy-score">Inf: <span id="ai-influence">0</span></span>
            <span class="ai-stat-inline">Deck: <span id="ai-deck-count">16</span></span>
            <span class="ai-stat-inline">Hand: <span id="ai-hand-count">0</span></span>
        </div>

        <!-- The Battlefield (Middle) -->
        <div id="board-container">
            <div id="board"></div>
        </div>

        <!-- Player Zone (Bottom) -->
        <div id="player-zone-container" class="player-zone-container">
            <div class="player-zone thin-zone">
                <span class="ai-stat-inline"><strong>Player (Greek)</strong></span>
                <span class="stat-scoreboard friendly-score">Inf: <span id="player-influence">0</span></span>
                <span class="ai-stat-inline">Deck: <span id="player-deck-count">16</span></span>
                <span class="ai-stat-inline">Hand: <span id="player-hand-count">0</span></span>
            </div>
            <div id="player-hand" class="hand"></div>
        </div>

        <!-- Action & Turn Controls -->
        <div id="controls">
            <h2 id="turn-indicator">Turn: Player</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-mute" title="Toggle Sound">🔊</button>
                <button id="btn-end-turn">End Turn</button>
            </div>
            <div id="action-log">Game Started...</div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
        <div class="game-over-panel">
            <h1 id="go-title">Game Over</h1>
            <div class="score-board">
                <div class="score-box" id="go-p1-score">
                    Player (Greek)<br><span id="go-p1-inf">0</span>
                </div>
                <div class="score-box" id="go-p2-score">
                    AI (Norse)<br><span id="go-p2-inf">0</span>
                </div>
            </div>
            <div class="game-over-buttons">
                <button id="btn-restart" onclick="location.reload()">Play Again</button>
                <button id="btn-download-log" onclick="downloadJSONLog()">Download Log</button>
            </div>
        </div>
    </div>
    <!-- Inspect Modal -->
    <div id="inspect-modal" class="modal-hidden">
        <div id="inspect-overlay" onclick="closeInspectModal()"></div>
        <div id="inspect-card" class="premium-card-25d friendly">
            <div class="inspect-top-bar" style="justify-content: center; padding-bottom: 0; background: transparent;">
                <div class="inspect-chess-symbol-top-left" style="font-size: 1.5em; font-weight: bold; padding: 5px;">
                    <span id="inspect-chess-symbol-top">♙</span>
                </div>
            </div>
            
            <div class="inspect-art">
                <span id="inspect-chess-symbol">♙</span>
            </div>
            
            <div class="inspect-info">
                <h2 id="inspect-title">Spartan Warrior</h2>
                <p id="inspect-desc" class="inspect-description">Description goes here.</p>
                <div class="inspect-bottom-indicators" style="display: flex; justify-content: space-around; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2);">
                    <div class="inspect-cost-badge">
                        <span id="inspect-cost-icon">⚡</span>
                        <span id="inspect-cost">1</span>
                    </div>
                    <div class="inspect-inf-top-badge" id="inspect-influence" style="font-size: 1.2em; padding: 5px 15px;">8</div>
                    <div class="inspect-class-badge" id="inspect-class">
                        <span id="inspect-class-icon">⚔️</span>
                        <span id="inspect-class-amp">3</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="AudioManager.js"></script>
    <script src="game.js"></script>
</body>

</html>
